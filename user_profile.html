<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>User Profile</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./commons-style.css">
    </head>
    <body>
        <div id="page-loader"><div class="spinner"></div></div>
        <div class="page-container page-overlay2">
            <header>
                <div class="row" >
                    <div class="logo-section col-md-9">
                        <a href="./user.html">
                            <h1 > Pintball </h1>
                        </a>
                    </div>
                    <div class=" col-md-2">
                        <h3><a class="style-container " href="./user_profile.html">Profile</a></h3>
                    </div>
                    <div class=" col-md-1">
                        <h3><a class="style-container" href="./index.html">Logout</a></h3>
                    </div>
                </div>
            </header>
            <main>
                <div class="container-form">
                    <form id="updateForm" onsubmit="handleUpdate(event)">
                        <div class="mb-3">
                            <label class="form-label">Full name</label>
                            <input required type="text" class="form-control" name="name" value="John Doe">
                        </div>
                        <div class="mb-3">                        
                            <label class="form-label">Username</label>
                            <input required type="text" class="form-control" name="username" value="john_doe" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input required type="email" class="form-control" name="email" value="john@example.com">
                        </div>
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Password</label>
                                <input minlength="8" required type="password" class="form-control" name="password" value="password123" id="password">
                            </div>
                            <div class="col">
                                <label class="form-label">Confirm password</label>
                                <input required type="password" class="form-control" name="confirm-password" value="password123" id="confirmPassword">
                            </div>
                        </div>
                        <div class="mb-3">                        
                            <label class="form-label">Team Name</label>
                            <input required type="text" class="form-control" name="team_name" value="Thunder Strikers">
                        </div>
                        <div class="mb-3">                        
                            <label class="form-label">Number of pax</label>
                            <input required type="number" class="form-control" name="number_pax" value="8">
                        </div>
                        <div class="mb-3">                        
                            <label class="form-label">Event type:</label>
                            <select name="event_type">
                                <option value="Speedball">Speedball</option>
                                <option value="Woodsball">Woodsball</option>
                                <option value="Scenario">Scenario</option>
                                <option value="Tournament">Tournament</option>
                                <option value="Recreational">Recreational</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">Update</button>
                    </form>
                </div>
            </main>        
            <footer> 
                <span> copy right for ABDUL BAQI</span>
            </footer>
        </div>
        <script>
            document.getElementById('updateForm').addEventListener('submit', function(event) {
                event.preventDefault();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;       
                if (password !== confirmPassword) {
                    alert('Password and Confirm Password fields do not match.');
                    return;
                }
                alert('Profile updated successfully!');
                window.location.href = './user.html';
            });
        </script>
        <script>
        (function(){
            var loader = document.getElementById('page-loader');
            var img = new Image();
            img.onload = img.onerror = function(){ loader.classList.add('loaded'); };
            img.src = './img/main.jpg';
            setTimeout(function(){ loader.classList.add('loaded'); }, 5000);
        })();
        </script>
    </body>
</html>
