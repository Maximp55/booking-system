<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./commons-style.css">
    </head>
    <body>
        <div id="page-loader"><div class="spinner"></div></div>
        <div class="page-container page-overlay">
            <header>
                <div class="row" >
                    <div class="logo-section col-md-11">
                        <a href="./index.html">
                            <h1 > Pintball </h1>
                        </a>
                    </div>
                    <div class=" col-md-1">
                        <h5><a class="style-container " href="./login.html">Login</a></h5>
                    </div>
                </div>
            </header>
            <main>
                <div class="container-form">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="mb-3">
                            <label class="form-label">Full name</label>
                            <input required type="text" class="form-control" name="name" id="name" value="John Doe">
                        </div>
                        <div class="mb-3">                        
                            <label class="form-label">Username</label>
                            <input required type="text" class="form-control" name="username" id="username" value="john_doe">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input required type="email" class="form-control" name="email" id="email" value="john@example.com">
                        </div>
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Password</label>
                                <input minlength="8" required type="password" class="form-control" name="password" id="password" value="password123">
                            </div>
                            <div class="col">
                                <label class="form-label">Confirm password</label>
                                <input required type="password" class="form-control" name="confirm-password" id="confirmPassword" value="password123">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">Submit</button>
                    </form>
                </div>
            </main>        
            <footer> 
                <span> copy right for ABDUL BAQI</span>
            </footer>
        </div>
        <script>
            function handleRegister(event) {
                event.preventDefault();
                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;
                if(password !== confirmPassword) {
                    alert('Password and Confirm Password fields do not match.');
                    return;
                }
                alert('Registration successful! Redirecting to login...');
                window.location.href = './login.html';
            }
        </script>
        <script>
        (function(){
            var loader = document.getElementById('page-loader');
            var img = new Image();
            img.onload = img.onerror = function(){ loader.classList.add('loaded'); };
            img.src = './img/main.jpg';
            setTimeout(function(){ loader.classList.add('loaded'); }, 5000);
        })();
        </script>
    </body>
</html>
