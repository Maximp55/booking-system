<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./commons-style.css">        
    </head>
    <body>
        <div id="page-loader"><div class="spinner"></div></div>
        <div class="page-container page-overlay">
            <header>
                <div class="row" >
                    <div class="logo-section col-md-10">
                        <a href="./index.html">
                            <h1 > Pintball </h1>
                        </a>
                    </div>
                    <div class=" col-md-2">
                        <h5>
                            <a class="style-container " href="./register.html">Sign-up</a>
                        </h5>
                    </div>
                </div>
            </header>
            <main>
                <div class="container-form">
                    <form class="border p-3" name="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label for="exampleInputEmail1"  class="form-label "><b>Username</b></label>
                            <input required type="text" name="username" class="form-control" id="loginUsername" value="john_doe">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label"><b>Password</b></label>
                            <input required type="password" minlength="8" name="password" class="form-control" id="loginPassword" value="password123">
                        </div>
                        <button type="submit" class="btn btn-primary">Login as User</button>
                        <a href="./admin.html" class="btn btn-danger ms-2">Login as Admin</a>
                    </form>
                </div>
            </main>
            <footer> 
                <span> copy right for ABDELBAGI</span>
            </footer>
        </div>
        <script>
            function handleLogin(event) {
                event.preventDefault();
                // Demo: redirect to user dashboard
                window.location.href = './user.html';
            }
        </script>
        <script>
        (function(){
            var loader = document.getElementById('page-loader');
            var img = new Image();
            img.onload = img.onerror = function(){ loader.classList.add('loaded'); };
            img.src = './img/main.jpg';
            setTimeout(function(){ loader.classList.add('loaded'); }, 5000);
        })();
        </script>
    </body>
</html>
