<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin - Search User</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="./commons-style.css">
        <style>
            table {
                margin: 10px 30px;
            }   
            table, th, td {
                border: 1px solid black;
                border-collapse: collapse;
                padding: 10px;
            }
            .container-view {
                border-radius: 5px;
                border: 1px solid black;
                background-color: rgb(244, 236, 236);
            }
            .container-view h1 {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="page-container">
            <div class="page-overlay">
                <header>
                    <div class="row">
                        <div class="logo-section col-md-11">
                            <a href="./admin.html">
                                <h1 style="color: black;"> Pintball </h1>
                            </a>
                        </div>
                        <div class=" col-md-1">
                            <a class="style-container " style="background-color: #dc3545; color: #fff;" href="./index.html">
                                Logout
                            </a>
                        </div>
                    </div>
                </header>
                <main>
                    <div class="menu">
                        <div class=""><a class="style-container " style="background-color: #f7d498; color: #000000;" href="./secure-admin-search.html">Search user</a></div>
                        <div class=""><a  class="style-container " style="background-color: rgb(45, 43, 43); color: #fff;" href="./secure-admin-delete.html">Delete user</a></div>
                        <div class=""><a class="style-container " style="background-color: rgb(45, 43, 43); color: #fff;" href="./secure-admin-add.html">Add category</a></div>
                        <div class=""><a class="style-container" style="background-color: rgb(45, 43, 43); color: #fff;" href="./secure-admin-view.html">View users</a></div>
                    </div>
                    <div class="container-form">
                        <form id="searchForm" class="border" onsubmit="handleSearch(event)">
                            <div class="col">
                                <label class="form-label">Search userName</label>
                                <input id="userName" required type="text" class="form-control" name="userName" value="john_doe">
                            </div>
                            <button type="submit" class="btn btn-primary mt-4">Search</button>
                        </form>               
                    </div>
                    <!-- Demo search results (always visible for presentation) -->
                    <div class="container-form mt-5">  
                        <div class="container-view">       
                            <h1>Search Results</h1>   
                            <table>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Password</th>
                                    <th>Access Type</th>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>John Doe</td>
                                    <td>john_doe</td>
                                    <td>john@example.com</td>
                                    <td>password123</td>
                                    <td>user</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </main>
            </div>
            <footer> 
                <span> copy right for ABDUL BAQI</span>
            </footer>
        </div>
        <script>
            function handleSearch(event) {
                event.preventDefault();
                alert('Search completed! Results shown below.');
            }
        </script>
    </body>
</html>
